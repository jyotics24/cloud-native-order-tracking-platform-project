# sonar-project.properties
# Tells SonarCloud which project this scan belongs to,
# and which folders/files to analyze.

sonar.organization=jyotics24
sonar.projectKey=jyotics24_cloud-native-order-tracking-platform-project

# Project metadata
sonar.projectName=Cloud-Native Order Tracking Platform
sonar.projectVersion=1.0

# Source code location - only scan the Python backend
sonar.sources=app/backend

# Exclude test files and virtual environments from main source scan
sonar.exclusions=**/venv/**,**/__pycache__/**

# Python test file location (for coverage/test detection)
sonar.python.version=3.11
